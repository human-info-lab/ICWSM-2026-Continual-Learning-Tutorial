<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presentation — Continual Learning for Online Behavioral Analytics</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --navy: #1a3058;
            --accent: #2b5797;
            --rule: #d1d5db;
            --muted: #6b7280;
            --ctrl-bg: #1e293b;
            --ctrl-border: #334155;
            --ctrl-text: #cbd5e1;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #2d2d2d;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        /* ── NAV ── */
        nav {
            flex-shrink: 0;
            background: var(--navy);
            border-bottom: 3px solid var(--accent);
        }

        nav ul {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            list-style: none;
            max-width: 860px;
            margin: 0 auto;
        }

        nav a {
            display: block;
            padding: 13px 18px;
            color: #cbd5e1;
            text-decoration: none;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            font-size: 13.5px;
            letter-spacing: 0.03em;
            transition: color 0.15s;
        }

        nav a:hover, nav a.active { color: #ffffff; }

        .nav-new {
            display: inline-block;
            background: #ef4444;
            color: #fff;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 1px 5px;
            border-radius: 3px;
            vertical-align: middle;
            margin-left: 5px;
            position: relative;
            top: -1px;
        }

        /* ── VIEWER AREA ── */
        .viewer-wrap {
            flex: 1;
            height: 0;
            overflow-y: auto;
            overflow-x: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 28px 16px;
            background: #3a3a3a;
        }

        #pdf-canvas {
            display: block;
            box-shadow: 0 8px 32px rgba(0,0,0,0.55);
            background: #fff;
            max-width: 100%;
        }

        .loading-msg {
            color: #94a3b8;
            font-size: 14px;
            margin-top: 40px;
            letter-spacing: 0.05em;
        }

        /* ── CONTROLS BAR ── */
        .controls {
            height: 52px;
            background: var(--ctrl-bg);
            border-top: 1px solid var(--ctrl-border);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            padding: 0 16px;
            flex-shrink: 0;
            flex-wrap: wrap;
        }

        .ctrl-group {
            display: flex;
            align-items: center;
            gap: 2px;
        }

        .ctrl-sep {
            width: 1px;
            height: 22px;
            background: var(--ctrl-border);
            margin: 0 8px;
        }

        .ctrl-btn {
            background: transparent;
            border: 1px solid transparent;
            color: var(--ctrl-text);
            font-size: 16px;
            width: 34px;
            height: 34px;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.12s, border-color 0.12s;
            user-select: none;
        }
        .ctrl-btn:hover { background: #334155; border-color: #475569; }
        .ctrl-btn:active { background: #475569; }
        .ctrl-btn:disabled { opacity: 0.35; cursor: default; }
        .ctrl-btn:disabled:hover { background: transparent; border-color: transparent; }

        .ctrl-btn.wide { width: auto; padding: 0 10px; font-size: 13px; }

        .page-input {
            width: 46px;
            height: 30px;
            background: #0f172a;
            border: 1px solid var(--ctrl-border);
            border-radius: 4px;
            color: #e2e8f0;
            font-size: 13px;
            text-align: center;
            outline: none;
        }
        .page-input:focus { border-color: var(--accent); }

        .page-label {
            color: #64748b;
            font-size: 13px;
            white-space: nowrap;
            padding: 0 4px;
        }

        .zoom-label {
            color: var(--ctrl-text);
            font-size: 12.5px;
            min-width: 46px;
            text-align: center;
        }

        /* hide scrollbars style but keep functionality */
        .viewer-wrap::-webkit-scrollbar { width: 8px; height: 8px; }
        .viewer-wrap::-webkit-scrollbar-track { background: #2d2d2d; }
        .viewer-wrap::-webkit-scrollbar-thumb { background: #555; border-radius: 4px; }
        .viewer-wrap::-webkit-scrollbar-thumb:hover { background: #777; }

        @media (max-width: 540px) {
            nav a { padding: 11px 11px; font-size: 12px; }
            .ctrl-btn.wide { display: none; }
        }
    </style>
</head>
<body>

    <!-- NAV -->
    <nav>
        <ul>
            <li><a href="index.html#overview">Overview</a></li>
            <li><a href="index.html#audience">Audience</a></li>
            <li><a href="index.html#schedule">Schedule</a></li>
            <li><a href="presentation.html" class="active">Presentation <span class="nav-new">New</span></a></li>
            <li><a href="index.html#presenters">Presenters</a></li>
            <li><a href="index.html#related">Related</a></li>
        </ul>
    </nav>

    <!-- SLIDE CANVAS -->
    <div class="viewer-wrap" id="viewer-wrap">
        <p class="loading-msg" id="loading-msg">Loading slides…</p>
        <canvas id="pdf-canvas"></canvas>
    </div>

    <!-- CONTROLS -->
    <div class="controls">
        <div class="ctrl-group">
            <button class="ctrl-btn" id="btn-first" title="First slide">&#171;</button>
            <button class="ctrl-btn" id="btn-prev"  title="Previous (←)">&#8249;</button>
        </div>

        <div class="ctrl-group" style="gap:6px; margin: 0 4px;">
            <input class="page-input" id="page-num" type="number" value="1" min="1">
            <span class="page-label">/ <span id="page-count">—</span></span>
        </div>

        <div class="ctrl-group">
            <button class="ctrl-btn" id="btn-next" title="Next (→)">&#8250;</button>
            <button class="ctrl-btn" id="btn-last" title="Last slide">&#187;</button>
        </div>

        <div class="ctrl-sep"></div>

        <div class="ctrl-group">
            <button class="ctrl-btn" id="btn-zoom-out" title="Zoom out (−)">&#8722;</button>
            <span class="zoom-label" id="zoom-label">—</span>
            <button class="ctrl-btn" id="btn-zoom-in"  title="Zoom in (+)">&#43;</button>
        </div>

        <div class="ctrl-sep"></div>

        <div class="ctrl-group">
            <button class="ctrl-btn wide" id="btn-fit-w" title="Fit width">Fit W</button>
            <button class="ctrl-btn wide" id="btn-fit-p" title="Fit page">Fit P</button>
        </div>

        <div class="ctrl-sep"></div>

        <div class="ctrl-group">
            <button class="ctrl-btn" id="btn-fs" title="Fullscreen">⛶</button>
        </div>

        <div class="ctrl-sep"></div>

        <div class="ctrl-group">
            <a class="ctrl-btn wide" href="presentation.pdf" download title="Download PDF">&#8595; Download</a>
            <a class="ctrl-btn wide" href="presentation.pdf" target="_blank" rel="noopener" title="Open PDF in new tab">&#8599; Open</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
    <script>
        const pdfjsLib = window['pdfjs-dist/build/pdf'];
        pdfjsLib.GlobalWorkerOptions.workerSrc =
            'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';

        const canvas   = document.getElementById('pdf-canvas');
        const ctx      = canvas.getContext('2d');
        const wrap     = document.getElementById('viewer-wrap');
        const loadMsg  = document.getElementById('loading-msg');

        const pageNumInput  = document.getElementById('page-num');
        const pageCountEl   = document.getElementById('page-count');
        const zoomLabel     = document.getElementById('zoom-label');

        const btnPrev   = document.getElementById('btn-prev');
        const btnNext   = document.getElementById('btn-next');
        const btnFirst  = document.getElementById('btn-first');
        const btnLast   = document.getElementById('btn-last');
        const btnZoomIn = document.getElementById('btn-zoom-in');
        const btnZoomOut= document.getElementById('btn-zoom-out');
        const btnFitW   = document.getElementById('btn-fit-w');
        const btnFitP   = document.getElementById('btn-fit-p');
        const btnFs     = document.getElementById('btn-fs');

        let pdfDoc      = null;
        let currentPage = 1;
        let scale       = 1.0;
        let rendering   = false;
        let renderTask  = null;

        const MIN_SCALE = 0.25;
        const MAX_SCALE = 4.0;
        const STEP      = 0.2;

        async function renderPage(num) {
            if (!pdfDoc) return;
            num = Math.max(1, Math.min(num, pdfDoc.numPages));
            currentPage = num;

            if (renderTask) { renderTask.cancel(); renderTask = null; }
            rendering = true;

            const page     = await pdfDoc.getPage(num);
            const viewport = page.getViewport({ scale });

            canvas.width  = viewport.width;
            canvas.height = viewport.height;

            const task = page.render({ canvasContext: ctx, viewport });
            renderTask = task;

            try {
                await task.promise;
            } catch (e) {
                if (e?.name === 'RenderingCancelledException') return;
            }

            rendering = false;
            renderTask = null;
            updateUI();
        }

        function updateUI() {
            pageNumInput.value = currentPage;
            const pct = Math.round(scale * 100);
            zoomLabel.textContent = pct + '%';
            btnPrev.disabled  = currentPage <= 1;
            btnFirst.disabled = currentPage <= 1;
            btnNext.disabled  = currentPage >= pdfDoc.numPages;
            btnLast.disabled  = currentPage >= pdfDoc.numPages;
            btnZoomOut.disabled = scale <= MIN_SCALE;
            btnZoomIn.disabled  = scale >= MAX_SCALE;
        }

        function fitWidth() {
            if (!pdfDoc) return;
            pdfDoc.getPage(currentPage).then(page => {
                const vp = page.getViewport({ scale: 1 });
                const avail = wrap.clientWidth - 32;
                scale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, avail / vp.width));
                renderPage(currentPage);
            });
        }

        function fitPage() {
            if (!pdfDoc) return;
            pdfDoc.getPage(currentPage).then(page => {
                const vp = page.getViewport({ scale: 1 });
                const aw = wrap.clientWidth  - 32;
                const ah = wrap.clientHeight - 32;
                scale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, Math.min(aw / vp.width, ah / vp.height)));
                renderPage(currentPage);
            });
        }

        function showLocalFileNotice() {
            canvas.style.display = 'none';
            document.querySelector('.controls').style.display = 'none';
            loadMsg.innerHTML = `
                <div style="max-width:480px;text-align:left;background:#1e293b;border:1px solid #334155;border-radius:8px;padding:28px 32px;line-height:1.7;">
                    <div style="font-size:15px;font-weight:700;color:#e2e8f0;margin-bottom:10px;">Run a local server to use the interactive viewer</div>
                    <p style="font-size:13.5px;color:#94a3b8;margin-bottom:18px;">Chrome blocks local file access from HTML pages. Serve the folder over HTTP:</p>
                    <code style="display:block;background:#0f172a;color:#7dd3fc;font-size:13px;padding:12px 16px;border-radius:5px;margin-bottom:18px;white-space:pre;">python3 -m http.server 8000</code>
                    <p style="font-size:13px;color:#64748b;margin-bottom:20px;">Then open <span style="color:#7dd3fc;">http://localhost:8000/presentation.html</span></p>
                    <a href="presentation.pdf" style="display:inline-block;background:#2b5797;color:#fff;font-size:13px;padding:8px 18px;border-radius:4px;text-decoration:none;" target="_blank">Open PDF directly instead →</a>
                </div>`;
        }

        function showIframeFallback() {
            canvas.style.display = 'none';
            loadMsg.style.display = 'none';
            document.querySelector('.controls').style.display = 'none';
            const iframe = document.createElement('iframe');
            iframe.src = 'presentation.pdf';
            iframe.style.cssText = 'width:100%;flex:1;min-height:100%;border:none;background:#fff;';
            wrap.style.padding = '0';
            wrap.appendChild(iframe);
        }

        // Chrome blocks all local file fetches on file:// — show instructions instead
        if (window.location.protocol === 'file:') {
            showLocalFileNotice();
        } else {
            pdfjsLib.getDocument('presentation.pdf').promise.then(doc => {
                pdfDoc = doc;
                loadMsg.style.display = 'none';
                canvas.style.display  = 'block';
                pageCountEl.textContent = doc.numPages;
                pageNumInput.max = doc.numPages;
                fitPage();
            }).catch(() => {
                showIframeFallback();
            });
        }

        // Navigation
        btnPrev.addEventListener('click',  () => renderPage(currentPage - 1));
        btnNext.addEventListener('click',  () => renderPage(currentPage + 1));
        btnFirst.addEventListener('click', () => renderPage(1));
        btnLast.addEventListener('click',  () => pdfDoc && renderPage(pdfDoc.numPages));

        pageNumInput.addEventListener('change', () => {
            const v = parseInt(pageNumInput.value, 10);
            if (!isNaN(v)) renderPage(v);
        });

        // Zoom
        btnZoomIn.addEventListener('click', () => {
            scale = Math.min(MAX_SCALE, Math.round((scale + STEP) * 10) / 10);
            renderPage(currentPage);
        });
        btnZoomOut.addEventListener('click', () => {
            scale = Math.max(MIN_SCALE, Math.round((scale - STEP) * 10) / 10);
            renderPage(currentPage);
        });
        btnFitW.addEventListener('click', fitWidth);
        btnFitP.addEventListener('click', fitPage);

        // Fullscreen
        btnFs.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', e => {
            if (e.target === pageNumInput) return;
            switch (e.key) {
                case 'ArrowRight': case 'ArrowDown': case ' ':
                    e.preventDefault(); renderPage(currentPage + 1); break;
                case 'ArrowLeft':  case 'ArrowUp':
                    e.preventDefault(); renderPage(currentPage - 1); break;
                case 'Home': renderPage(1); break;
                case 'End':  pdfDoc && renderPage(pdfDoc.numPages); break;
                case '+': case '=':
                    scale = Math.min(MAX_SCALE, Math.round((scale + STEP) * 10) / 10);
                    renderPage(currentPage); break;
                case '-':
                    scale = Math.max(MIN_SCALE, Math.round((scale - STEP) * 10) / 10);
                    renderPage(currentPage); break;
                case 'w': fitWidth(); break;
                case 'p': fitPage();  break;
                case 'f': btnFs.click(); break;
            }
        });

        // Refit on resize
        let resizeTimer;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(fitPage, 200);
        });
    </script>
</body>
</html>
